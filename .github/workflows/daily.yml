name: CBB Daily Automation

on:
  schedule:
    - cron: '0 14 * * *'  # 9:00 AM CT (CDT = UTC-5, use '0 13 * * *' in summer)
  workflow_dispatch:        # lets you trigger it manually from GitHub UI

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas numpy scipy scikit-learn

      - name: Run automation
        run: python automate.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/latest.json public/results/results.json picks/
          git diff --cached --quiet || git commit -m "auto: $(date +'%b %d') picks + results"
          git push
